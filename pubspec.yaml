name: easydiet
description: "EasyDiet - Plan repas, courses et suivi poids"
publish_to: 'none'
version: 1.3.1+7

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^14.8.1

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.70.2

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  wakelock_plus: ^1.2.10
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.25.0
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "easydiet_icon_raw.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "easydiet_icon_raw.png"

flutter:
  uses-material-design: true
  assets:
    - assets/recipes/
